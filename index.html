<style>
:root {
  --bg:        #0A0D13;
  --surface:   #12161F;
  --surface-hi: #1A1F2C;
  --border:    #232936;
  --amber:     #F0B90B;
  --teal:      #00D4AA;
  --text:      #E8EAED;
  --text-muted: #8B92A6;
  --red:       #FF5C5C;
}

*, *::before, *::after { box-sizing: border-box; }
body        { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); margin: 0; }
.font-display { font-family: 'Space Grotesk', sans-serif; }
.font-mono    { font-family: 'JetBrains Mono', monospace; }

.grid-glow {
  background-image:
    linear-gradient(to right,  #ffffff08 1px, transparent 1px),
    linear-gradient(to bottom, #ffffff08 1px, transparent 1px);
  background-size: 64px 64px;
  -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 30%, black 30%, transparent 75%);
          mask-image: radial-gradient(ellipse 70% 60% at 50% 30%, black 30%, transparent 75%);
}

.calc-card { position: relative; box-shadow: 0 0 0 1px #ffffff05, 0 30px 60px -20px #000000B3, 0 0 80px -20px #F0B90B1F; }
.calc-card::before {
  content: ''; position: absolute; inset: -1px; border-radius: inherit; padding: 1px;
  background: linear-gradient(135deg, #F0B90B4D, transparent 30%, transparent 70%, #00D4AA33);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
}

@keyframes pulseGlow { 0%,100% { opacity:1; } 50% { opacity:0.55; } }
@keyframes shimmer   { 0% { background-position:200% 0; } 100% { background-position:-200% 0; } }
@keyframes spin      { to { transform:rotate(360deg); } }
@keyframes fadeIn    { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

.ticker-pulse { animation: pulseGlow 2.8s ease-in-out infinite; }
.shimmer {
  background: linear-gradient(90deg, #1A1F2C 25%, #232936 50%, #1A1F2C 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 8px;
}

#authSpinner { position: fixed; inset: 0; z-index: 300; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); transition: opacity .35s ease, visibility .35s ease; }
#authSpinner.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
.spin-ring { width: 44px; height: 44px; border: 3px solid #1A1F2C; border-top-color: var(--amber); border-radius: 50%; animation: spin .75s linear infinite; margin-bottom: 18px; }

#authGate { position: fixed; inset: 0; z-index: 200; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px) saturate(130%); background: linear-gradient(155deg, #0A0D13EE 0%, #12161FCC 50%, #0A0D13EE 100%); transition: opacity .45s ease, visibility .45s ease; overflow-y: auto; padding: 24px 16px; }
#authGate.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
.gate-card { position: relative; background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 44px 40px 36px; max-width: 470px; width: 100%; box-shadow: 0 0 0 1px #ffffff06, 0 40px 80px -20px #000000CC, 0 0 130px -30px #F0B90B28; text-align: center; animation: fadeIn .5s ease both; }
.gate-feature { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text); text-align: left; }
.btn-primary { display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background: var(--amber); color: #15130A; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 15px; padding: 14px 28px; border-radius: 14px; border: none; cursor: pointer; transition: opacity .2s, transform .15s, box-shadow .2s; box-shadow: 0 0 40px #F0B90B2A; text-decoration: none; }
.btn-secondary { display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background: transparent; color: var(--text-muted); font-family: 'Inter', sans-serif; font-weight: 500; font-size: 13px; padding: 11px 28px; border-radius: 12px; border: 1px solid var(--border); cursor: pointer; transition: all .2s; text-decoration: none; }

<body class="min-h-screen antialiased">
    <script>
'use strict';
const COIN_IDS = { BTC: 'bitcoin', ETH: 'ethereum', SOL: 'solana', LINK: 'chainlink' };
const EXCHANGE_VARIANCE = { Binance: 0, Bybit: +0.185, Coinbase: +0.420, OKX: -0.155 };
let livePrices = {};

async function fetchLivePrices() {
  const ids = Object.values(COIN_IDS).join(',');
  try {
    const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`);
    const data = await res.json();
    for (const [ticker, id] of Object.entries(COIN_IDS)) {
      if (data[id]?.usd) livePrices[ticker] = data[id].usd;
    }
  } catch (err) { console.warn('Fetch failed'); }
}

function runArbitrageScanner() {
  const container = document.getElementById('arbitrageList');
  if (!Object.keys(livePrices).length) return;
  container.innerHTML = '';
  const exchanges = Object.keys(EXCHANGE_VARIANCE);

  for (const [ticker, spotUSD] of Object.entries(livePrices)) {
    const priced = exchanges.map(ex => ({
      name: ex,
      price: spotUSD * (1 + EXCHANGE_VARIANCE[ex] / 100)
    }));
    const buyEx = priced.reduce((a, b) => a.price < b.price ? a : b);
    const sellEx = priced.reduce((a, b) => a.price > b.price ? a : b);
    const spreadPct = ((sellEx.price - buyEx.price) / buyEx.price * 100).toFixed(3);
    
    const row = document.createElement('div');
    row.className = 'flex justify-between items-center p-2.5 rounded-lg bg-[#0A0D13] border border-[var(--border)] gap-2';
    row.innerHTML = `
      <div style="display:flex;flex-direction:column;gap:2px;min-width:0;">
        <span style="font-size:10px;color:var(--text-muted);">BUY → SELL</span>
        <span><b style="color:var(--amber);">${ticker}</b>: ${buyEx.name} ➔ ${sellEx.name}</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;">
        <span style="font-size:11px;color:var(--teal);font-weight:600;">+${spreadPct}%</span>
        <span style="font-size:9px;color:var(--text-muted);">Spread</span>
      </div>`;
    container.appendChild(row);
  }
}

fetchLivePrices().then(runArbitrageScanner);
setInterval(async () => { await fetchLivePrices(); runArbitrageScanner(); }, 30000);
</script>
</body>
